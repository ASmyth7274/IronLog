<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0c0f">
<title>IronLog</title>
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{
  /* dark: "white on black" editorial theme */
  --bg:#0B0B0D; --bgtop:#17181D; --card:#151518; --card2:#1F1F24; --line:#28282E;
  --text:#F5F3EE; --dim:#94948E;
  --acc:#C9A96D; --acc-dim:rgba(201,169,109,.15);
  --chrome:#F2EFE7; --chrome-text:#16171B;      /* inverse buttons/chips */
  --navbg:#1A1B20; --navfg:#8D8D94; --navon:#FFFFFF;
  --hdr:rgba(11,11,13,.85);
  --grn:#2fd671; --grn-dim:rgba(47,214,113,.12);
  --amb:#f5b62e; --red:#ff5c5c; --ppl:#b07aff; --gold:#ffcf4d;
  --shadow:0 8px 24px rgba(0,0,0,.32);
  --nav-h:62px;
}
/* light: "black on white" — warm paper & charcoal, toggled in Settings */
body.light{
  --bg:#ECEAE3; --bgtop:#F4F2EB; --card:#FFFFFF; --card2:#F0EEE6; --line:#E3E0D6;
  --text:#1A1B1E; --dim:#85847C;
  --acc:#A9884D; --acc-dim:rgba(169,136,77,.14);
  --chrome:#1D1E24; --chrome-text:#F5F3EE;
  --navbg:#1D1E24; --navfg:#96959C; --navon:#FFFFFF;
  --hdr:rgba(236,234,227,.85);
  --grn-dim:rgba(47,214,113,.16);
  --shadow:0 10px 26px rgba(35,32,26,.10);
}
*{box-sizing:border-box}
html{height:100%;overflow:hidden}
body{
  margin:0;background:var(--bg);color:var(--text);
  font:16px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
  overscroll-behavior:none;touch-action:manipulation;
  /* app shell pinned to the viewport EDGES, not sized by height units:
     100dvh and window.innerHeight both misreport in iOS home-screen mode
     (they exclude the status-bar / home-indicator bands), which left dead
     space under the tab bar. position:fixed + inset:0 needs no height math —
     the shell always spans exactly the real viewport. */
  position:fixed;inset:0;
  overflow:hidden;
  display:flex;flex-direction:column;
}
button{font:inherit;color:inherit;background:none;border:0;padding:0;margin:0;touch-action:manipulation;cursor:pointer}
input,textarea,select{font:inherit;color:inherit}
h1,h2,h3,p{margin:0}
.num{font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header{
  flex:0 0 auto;z-index:30;
  padding:env(safe-area-inset-top) 16px 0;
  background:var(--hdr);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
}
.hbar{height:50px;display:flex;align-items:center;justify-content:space-between}
.hbar h1{font-size:21px;font-weight:800;letter-spacing:-.3px}
.icon-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;color:var(--dim)}
.icon-btn:active{background:var(--card2)}
.icon-btn svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

/* ---------- main / pages ---------- */
main{
  flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:12px 13px 120px;   /* bottom clearance for the floating rest pill */
}
.page{display:none}
.page.active{display:block}

/* ---------- bottom nav ---------- */
/* floating charcoal pill nav (both themes), screenshot-style */
nav{
  flex:0 0 auto;z-index:35;display:flex;
  margin:6px 14px calc(10px + env(safe-area-inset-bottom));
  background:var(--navbg);border-radius:24px;padding:4px 6px;
  box-shadow:var(--shadow);
}
nav button{flex:1;height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--navfg);position:relative;border-radius:18px}
nav button.on{color:var(--navon)}
nav button svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button span{font-size:10px;font-weight:600;letter-spacing:.2px}
nav button .dot{position:absolute;top:6px;right:calc(50% - 17px);width:8px;height:8px;border-radius:4px;background:var(--grn)}

/* ---------- cards / common ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin-bottom:12px}
.card h3{font-size:15px;font-weight:700;margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.dim{color:var(--dim)}
.small{font-size:13px}
.tiny{font-size:11px}
.bold{font-weight:700}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}

.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  min-height:52px;border-radius:14px;font-size:17px;font-weight:700;
  background:var(--card2);color:var(--text);
}
.btn:active{filter:brightness(1.2)}
.btn.primary{background:var(--acc);color:#fff}
.btn.green{background:var(--grn);color:#04170b}
.btn.danger{background:rgba(255,92,92,.14);color:var(--red)}
.btn.ghost{background:var(--card2)}
.btn.sm{min-height:42px;font-size:15px;border-radius:12px}
.btn.inline{width:auto;padding:0 16px}

.in{
  width:100%;background:var(--card2);border:1px solid transparent;border-radius:12px;
  color:var(--text);font-size:17px;padding:12px;outline:none;-webkit-appearance:none;appearance:none;
}
.in:focus{border-color:var(--acc)}
textarea.in{resize:vertical;min-height:74px}
select.in{background-image:none}
.lbl{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin:14px 2px 6px;display:block}

.seg{display:flex;background:var(--card2);border-radius:12px;padding:3px;gap:2px}
.seg>button{flex:1;min-height:36px;border-radius:9px;color:var(--dim);font-size:13.5px;font-weight:700;padding:0 4px}
.seg>button.on{background:var(--acc);color:#fff}

.chips{display:flex;gap:8px;overflow-x:auto;padding:2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;min-height:36px;padding:0 14px;border-radius:18px;background:var(--card2);color:var(--dim);font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.chip.on{background:var(--chrome);color:var(--chrome-text);box-shadow:none}

.tgl{width:52px;height:31px;border-radius:16px;background:var(--card2);position:relative;transition:.2s;flex:0 0 auto}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:25px;height:25px;border-radius:13px;background:#5a6272;transition:.2s}
.tgl.on{background:var(--grn)}
.tgl.on::after{left:24px;background:#fff}

.lrow{display:flex;align-items:center;gap:11px;padding:13px 2px;border-bottom:1px solid var(--line);min-height:52px}
.lrow:last-child{border-bottom:0}

.empty{padding:46px 20px;text-align:center;color:var(--dim)}
.empty .big{font-size:40px;margin-bottom:12px}
.empty p{font-size:14.5px}

hr{border:0;border-top:1px solid var(--line);margin:14px 0}

/* ---------- log: workout header card ---------- */
.wo-top{display:flex;align-items:center;gap:10px}
.wo-top .t{font-size:30px;font-weight:800;letter-spacing:-.5px}
.wo-stats{display:flex;gap:16px;margin-top:4px;font-size:13px;color:var(--dim)}
.wo-stats b{color:var(--text);font-weight:700}

/* ---------- log: exercise card / set grid ---------- */
.exname{font-size:17px;font-weight:800;color:var(--acc)}
.exsub{font-size:12px;color:var(--dim);margin-top:1px}
.note-pill{font-size:13px;color:var(--amb);background:rgba(245,182,46,.08);border-radius:9px;padding:6px 10px;margin-top:8px}
.setgrid{margin-top:10px}
.sethead,.setrow{display:grid;grid-template-columns:36px 74px 1fr 56px 44px 42px;gap:5px;align-items:center}
.sethead{font-size:10.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;text-align:center;padding-bottom:4px}
.setrow{padding:3px 0;border-radius:12px}
.setrow.done{background:var(--grn-dim)}
.setrow.prset .set-type{box-shadow:0 0 0 1.5px var(--gold);color:var(--gold)}
.set-type{
  height:38px;border-radius:10px;font-size:14px;font-weight:800;color:var(--dim);
  background:var(--card2);display:flex;align-items:center;justify-content:center;
}
.set-type.tW{color:var(--amb)}.set-type.tD{color:var(--ppl)}.set-type.tF{color:var(--red)}
.prev-cell{height:38px;font-size:12.5px;font-weight:600;color:var(--dim);display:flex;align-items:center;justify-content:center;border-radius:10px;overflow:hidden;white-space:nowrap}
.prev-cell:active{background:var(--card2)}
.set-in{
  width:100%;height:38px;background:var(--card2);border:1px solid transparent;border-radius:10px;
  color:var(--text);font-size:16px;font-weight:700;text-align:center;outline:none;padding:0 2px;-webkit-appearance:none;
}
.set-in:focus{border-color:var(--acc)}
.set-in::placeholder{color:#525a68;font-weight:600}
.setrow.done .set-in{background:transparent}
.chk{
  height:38px;border-radius:10px;background:var(--card2);color:#525a68;
  display:flex;align-items:center;justify-content:center;
}
.chk svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.setrow.done .chk{background:var(--grn);color:#04170b}
.addset-row{display:flex;gap:8px;margin-top:10px}

/* ---------- rest timer pill ---------- */
#restpill{
  position:fixed;left:12px;right:12px;z-index:40;
  bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 22px);
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:10px 12px 9px;
  transform:translateY(160%);opacity:0;transition:transform .25s,opacity .25s;
  box-shadow:var(--shadow),0 0 0 1.5px var(--line);
}
#restpill.show{transform:none;opacity:1}
#restpill.donefx{box-shadow:var(--shadow),0 0 0 1.5px rgba(47,214,113,.65)}
#rt-track{height:6px;border-radius:3px;background:var(--card2);overflow:hidden;margin-bottom:8px}
#rt-fill{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,var(--acc),#8b5cf6);transition:width .2s linear}
#restpill.donefx #rt-fill{background:var(--grn)}
.rt-row{display:flex;align-items:center;gap:6px}
#rt-time{flex:1;text-align:center;font-size:30px;font-weight:800;letter-spacing:-.5px}
.rt-btn{min-width:52px;height:42px;border-radius:12px;background:var(--card2);font-size:14px;font-weight:800}
.rt-btn.x{min-width:44px;color:var(--dim)}

/* ---------- sheets / overlay ---------- */
.overlay{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);
  display:flex;align-items:flex-end;opacity:0;transition:opacity .2s;
}
.overlay.open{opacity:1}
.sheet{
  width:100%;max-height:88dvh;overflow-y:auto;background:var(--card);
  border-radius:22px 22px 0 0;padding:8px 16px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(40px);transition:transform .22s;
}
.overlay.open .sheet{transform:none}
.grabber{width:40px;height:4px;border-radius:2px;background:var(--line);margin:4px auto 8px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sheet-head h2{font-size:19px;font-weight:800}
.sheet-x{width:38px;height:38px;border-radius:12px;background:var(--card2);color:var(--dim);font-size:15px;display:flex;align-items:center;justify-content:center}

/* ---------- toasts ---------- */
#toasts{position:fixed;top:calc(env(safe-area-inset-top) + 58px);left:14px;right:14px;z-index:70;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast{
  background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px 15px;
  color:var(--text);font-size:14.5px;font-weight:600;box-shadow:var(--shadow);
  opacity:0;transform:translateY(-8px);transition:.25s;
}
.toast.in{opacity:1;transform:none}
.toast.pr{border-color:var(--gold);color:var(--gold);background:#241f10}

/* ---------- exercise picker ---------- */
.search-wrap{position:sticky;top:0;background:var(--card);padding:2px 0 10px;z-index:2}
.ex-row{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line);min-height:56px}
.ex-row .sel-dot{width:24px;height:24px;border-radius:13px;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px;font-weight:900}
.ex-row.sel .sel-dot{background:var(--acc);border-color:var(--acc);color:#fff}

/* ---------- history ---------- */
.hist-line{font-size:13.5px;color:var(--dim);padding:2px 0}
.hist-line b{color:var(--text);font-weight:600}

/* ---------- progress ---------- */
.rec-val{font-size:19px;font-weight:800}
.bal-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.bal-row .nm{width:92px;font-size:13px;font-weight:600;color:var(--dim);flex:0 0 auto}
.bal-track{flex:1;height:14px;border-radius:7px;background:var(--card2);overflow:hidden}
.bal-fill{height:100%;border-radius:7px;background:var(--acc)}
.bal-row .pct{width:40px;text-align:right;font-size:13px;font-weight:700}
.chart-box{position:relative;height:230px}
.chart-box.short{height:200px}

/* ---------- body ---------- */
.bw-big{font-size:44px;font-weight:800;letter-spacing:-1px;line-height:1.1}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-tile{aspect-ratio:3/4;border-radius:12px;overflow:hidden;background:var(--card2);position:relative}
.photo-tile img{width:100%;height:100%;object-fit:cover;display:block}
.photo-tile .pd{position:absolute;bottom:0;left:0;right:0;font-size:10px;font-weight:700;padding:8px 6px 4px;background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff}
.photo-add{aspect-ratio:3/4;border-radius:12px;border:1.5px dashed var(--line);color:var(--dim);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:12px;font-weight:600}
.photo-add b{font-size:26px;font-weight:400}

/* stat grid for finish sheet */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0}
.statgrid>div{background:var(--card2);border-radius:13px;padding:11px 13px}
.statgrid .v{font-size:20px;font-weight:800}
.statgrid .k{font-size:11.5px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.4px}

/* ---------- editorial polish ---------- */
body{background:linear-gradient(180deg,var(--bgtop) 0%,var(--bg) 320px) no-repeat,var(--bg)}
.btn,.chip,.rt-btn,.set-type,.chk,.icon-btn{transition:transform .12s,filter .15s,background .15s,color .15s}
.btn:active{transform:scale(.975)}
.btn.primary{background:var(--chrome);color:var(--chrome-text);box-shadow:var(--shadow)}
.btn.green{background:linear-gradient(135deg,#34e07a,#17b45a);box-shadow:0 4px 16px rgba(47,214,113,.22)}
.card{box-shadow:var(--shadow)}
.hbar h1{font-size:21px;letter-spacing:-.4px;color:var(--text)}
nav button.on svg{filter:drop-shadow(0 0 6px rgba(255,255,255,.4))}
.toast.pr{box-shadow:0 0 26px rgba(255,207,77,.3),var(--shadow);font-size:15.5px}
.bal-fill{background:linear-gradient(90deg,#4c8dff,#8b5cf6)}
.set-in:focus{box-shadow:0 0 0 3px var(--acc-dim)}
.in:focus{box-shadow:0 0 0 3px var(--acc-dim)}
.seg>button.on{background:var(--chrome);color:var(--chrome-text)}

/* quote card — editorial serif */
.quote{position:relative;padding:18px 16px 14px;overflow:hidden}
.qtext{font-family:ui-serif,'New York',Georgia,serif;font-size:17.5px;font-weight:600;line-height:1.5;position:relative}
.qwho{color:var(--dim);font-size:13px;margin-top:8px;font-weight:600}
.qmark{position:absolute;top:0;right:12px;font-size:70px;font-weight:800;color:var(--acc);opacity:.18;line-height:1;pointer-events:none}

/* persistent setup note */
.pin-note{font-size:13px;color:var(--acc);background:var(--acc-dim);border-radius:9px;padding:6px 10px;margin-top:8px}

/* strength level chip — bronze */
.levelchip{flex:0 0 auto;padding:9px 16px;border-radius:14px;font-weight:800;font-size:15px;background:linear-gradient(135deg,#D3B075,#9E7B3D);color:#fff;box-shadow:0 4px 14px rgba(201,169,109,.35)}

/* plate calculator visual */
.plates-viz{display:flex;align-items:center;justify-content:center;gap:3px;padding:16px 4px 4px;min-height:130px}
.bar-line{width:42px;height:8px;border-radius:4px 0 0 4px;background:linear-gradient(#8a93a5,#5b6472);flex:0 0 auto}
.bar-collar{width:9px;height:18px;border-radius:3px;background:#98a1b3;flex:0 0 auto}
.pwrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.plate{border-radius:5px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.14),0 2px 8px rgba(0,0,0,.45)}
.plbl{font-size:9.5px;color:var(--dim);font-weight:700}

/* muscle recovery map */
.mm-wrap{display:flex;justify-content:center;gap:6px}
.mm-wrap>div{flex:1;min-width:0}
.mm-wrap svg{width:100%;height:auto;display:block}
.mm-view-lbl{text-align:center;font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.mm-scale{display:flex;align-items:center;gap:8px;margin:12px 2px 2px;font-size:11px;color:var(--dim);font-weight:600}
.mm-grad{flex:1;height:8px;border-radius:4px;background:linear-gradient(90deg,#22a355,#eab308,#ef4444)}
.rec-chip{flex:0 0 auto;font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:10px}

/* ---------- v3: set-complete pop ---------- */
@keyframes chkpop{0%{transform:scale(1)}45%{transform:scale(1.3)}100%{transform:scale(1)}}
.chk.pop{animation:chkpop .32s ease-out}

/* ---------- v3: muscle map glow states (opacity anims = composited/cheap) ---------- */
.mm-wrap g[data-m]{cursor:pointer}
.mm-hot{filter:drop-shadow(0 0 5px rgba(255,70,70,.85));animation:mmpulse 1.1s ease-in-out infinite}
.mm-warm{filter:drop-shadow(0 0 4px rgba(245,180,50,.6));animation:mmpulse 2.1s ease-in-out infinite}
.mm-fresh{filter:drop-shadow(0 0 4px rgba(47,214,113,.5));animation:mmbreathe 3.4s ease-in-out infinite}
@keyframes mmpulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes mmbreathe{0%,100%{opacity:.78}50%{opacity:1}}

/* ---------- v3: radar flair ---------- */
.chart-box canvas{position:relative;z-index:1}
.radar-glow{position:absolute;inset:12%;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.2),transparent 65%)}
.rfx{position:absolute;border-radius:50%;animation:rfxfloat 3s ease-in-out infinite}
@keyframes rfxfloat{0%,100%{transform:translateY(0);opacity:.25}50%{transform:translateY(-9px);opacity:1}}

/* ---------- v3: floating Add button in the exercise picker ---------- */
.sticky-add{position:sticky;bottom:-1px;padding:12px 0 6px;background:linear-gradient(transparent,var(--card) 40%);z-index:3}

/* v3.2: applied by the standalone shell healer when iOS reports the bottom
   safe-area inset as 0 despite the home indicator being present */
body.vfix nav{margin-bottom:calc(10px + max(env(safe-area-inset-bottom),24px))}
body.vfix #restpill{bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom),24px) + 22px)}

/* ---------- v4: greeting + light-mode fine-tuning ---------- */
.greet-wrap{padding:8px 4px 16px}
.greet-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.greet{font-size:30px;font-weight:800;letter-spacing:-.6px;line-height:1.15}
.greet .nm{font-family:ui-serif,'New York',Georgia,serif;font-style:italic;font-weight:600;color:var(--acc)}
body.light .overlay{background:rgba(24,21,15,.35)}
body.light .toast.pr{color:#7A5D12;background:rgba(201,169,109,.2);border-color:#C9A96D}
body.light .qmark{opacity:.25}
</style>
</head>
<body>

<header>
  <div class="hbar">
    <h1 id="htitle">IronLog</h1>
    <button class="icon-btn" id="gearbtn" aria-label="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.8v2.4M12 18.8v2.4M2.8 12h2.4M18.8 12h2.4M5.5 5.5l1.7 1.7M16.8 16.8l1.7 1.7M18.5 5.5l-1.7 1.7M7.2 16.8l-1.7 1.7"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="page" id="page-log"></div>
  <div class="page" id="page-templates"></div>
  <div class="page" id="page-history"></div>
  <div class="page" id="page-progress"></div>
  <div class="page" id="page-body"></div>
</main>

<div id="restpill">
  <div id="rt-track"><div id="rt-fill"></div></div>
  <div class="rt-row">

<script>
'use strict';
/* ==========================================================================
   DATA MODEL — IndexedDB, database "ironlog", version 1
   --------------------------------------------------------------------------
   Object stores:
   exercises  {id, name, m, s[], e, custom?, restSec?}
                m  = primary muscle group, s = secondary muscle groups,
                e  = equipment. restSec = per-exercise rest override (seconds).
   workouts   {id, name, notes, startedAt, finishedAt, dur,   // ms epoch, dur in sec
                exs:[{exId, notes, sets:[{t,w,r,rpe,pr?}]}]}
                t = set type: 'N' normal | 'W' warm-up | 'D' drop | 'F' failure
                w = weight, r = reps, rpe = RPE. Only completed sets are saved.
   templates  {id, name, pos, exs:[{exId, sets, reps, w, rpe}]}  // targets
   body       {id, date, key, value}   // key = 'Weight' or a custom measurement name
   photos     {id, date, blob}         // JPEG Blob — the reason we use IndexedDB:
                                       // photos would blow past localStorage's ~5MB.
   kv         plain key→value store:
                'settings' {unit, restSec, barWeight, plates[], sound, vibrate}
                'active'   the in-progress workout, autosaved on every change so
                           a page reload / crash never loses a session.
   Weights are stored as entered, in the currently selected unit.
   ========================================================================== */

const BASE_MUSCLES=['Chest','Back','Shoulders','Biceps','Triceps','Forearms','Quads','Hamstrings','Glutes','Calves','Abs','Traps'];

const APP_VER='4.0';   // shown in Settings — lets you check which build a device runs
const DEF={unit:'kg',restSec:120,barWeight:20,plates:[25,20,15,10,5,2.5,1.25],sound:true,vibrate:true,notify:false,theme:'dark',name:''};

const E=(id,name,m,s,e)=>({id,name,m,s,e});
const SEED=[

const SEED_PATCH={
  x22:{m:'Rear Delts',s:['Traps','Back']},
  x23:{m:'Side Delts',s:[]},
  x24:{m:'Side Delts',s:[]},
  x25:{m:'Front Delts',s:[]},
  x26:{m:'Rear Delts',s:['Back']},

/* ---------------- IndexedDB ---------------- */
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('ironlog',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      d.createObjectStore('exercises',{keyPath:'id'});
      d.createObjectStore('workouts',{keyPath:'id'});
      d.createObjectStore('templates',{keyPath:'id'});
      d.createObjectStore('body',{keyPath:'id'});
      d.createObjectStore('photos',{keyPath:'id'});
      d.createObjectStore('kv');
    };
    r.onsuccess=()=>{db=r.result;res(db)};
    r.onerror=()=>rej(r.error);
  });
}
const req=r=>new Promise((res,rej)=>{r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
const store=(s,m)=>db.transaction(s,m||'readonly').objectStore(s);
const allOf=s=>req(store(s).getAll());
const dbPut=(s,v,k)=>req(store(s,'readwrite').put(v,k));
const dbDel=(s,k)=>req(store(s,'readwrite').delete(k));
const dbClear=s=>req(store(s,'readwrite').clear());
const kvGet=k=>req(store('kv').get(k));
const kvPut=(k,v)=>dbPut('kv',v,k);
const kvDel=k=>dbDel('kv',k);

/* ---------------- app state ---------------- */
const S={
  tab:'log',
  ex:new Map(),      // exerciseId -> exercise
  workouts:[],       // finished workouts
  templates:[],
  body:[],
  photos:[],
  set:{...DEF},      // settings
  active:null,       // in-progress workout
  prev:{},           // exId -> {date, sets[]} previous-session cache (KEY feature)
  records:{},        // exId -> {e1rm:{v,date}, w:{v,date}, vol:{v,date}, fresh}
};

/* ---------------- tiny helpers ---------------- */
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
function h(tag,attrs,...kids){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(v==null)continue;
    if(k==='class')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  for(const kd of kids.flat(Infinity)){
    if(kd==null||kd==='')continue;
    el.append(kd.nodeType?kd:document.createTextNode(kd));
  }
  return el;
}
const epley=(w,r)=>r>0?(r===1?w:w*(1+r/30)):0;
const round1=v=>Math.round(v*10)/10;
const fmtW=v=>v==null||isNaN(v)?'—':String(parseFloat(Number(v).toFixed(2)));
const fmtVol=v=>v>=100000?Math.round(v/1000)+'k':v>=10000?(v/1000).toFixed(1)+'k':String(Math.round(v));
function fmtDur(sec){
  sec=Math.max(0,Math.floor(sec));
  const hh=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s2=sec%60;
  return hh?hh+':'+String(m).padStart(2,'0')+':'+String(s2).padStart(2,'0'):m+':'+String(s2).padStart(2,'0');
}
const fmtClock=fmtDur;
const fmtDate=ts=>new Date(ts).toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});
const fmtDateShort=ts=>new Date(ts).toLocaleDateString(undefined,{day:'numeric',month:'short'});
const fmtTime=ts=>new Date(ts).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
const numOr=(str,fallback)=>{const v=parseFloat(String(str).replace(',','.'));return isNaN(v)?fallback:v;};

/* ---------------- sheets / dialogs / toasts ---------------- */
function sheet(title,content,opts={}){
  let closed=false;
  const ov=h('div',{class:'overlay'});
  const sh=h('div',{class:'sheet'},
    h('div',{class:'grabber'}),
    h('div',{class:'sheet-head'},h('h2',{},title),h('button',{class:'sheet-x',onclick:()=>close()},'✕')),
    content);
  ov.append(sh);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  document.body.append(ov);
  requestAnimationFrame(()=>ov.classList.add('open'));
  function close(){
    if(closed)return;closed=true;
    ov.classList.remove('open');
    setTimeout(()=>ov.remove(),210);
    if(opts.onClose)opts.onClose();
  }
  return close;
}
function ask(title,msg,okLabel,danger){
  return new Promise(res=>{
    let done=false;
    const c=h('div',{},
      h('p',{class:'dim small',style:'margin:2px 2px 16px'},msg),
      h('button',{class:'btn '+(danger?'danger':'primary'),onclick:()=>{done=true;close();res(true);}},okLabel||'Confirm'),
      h('button',{class:'btn mt8',onclick:()=>close()},'Cancel'));
    const close=sheet(title,c,{onClose:()=>{if(!done)res(false);}});
  });
}
function toast(msg,opts={}){
  const t=h('div',{class:'toast'+(opts.pr?' pr':'')},msg);
  $('#toasts').append(t);
  requestAnimationFrame(()=>t.classList.add('in'));
  setTimeout(()=>{t.classList.remove('in');setTimeout(()=>t.remove(),300)},opts.dur||2600);
}
function seg(opts,cur,cb){
  const el=h('div',{class:'seg'});
  for(const o of opts){
    const val=Array.isArray(o)?o[0]:o, label=Array.isArray(o)?o[1]:o;
    const b=h('button',{class:val===cur?'on':'',onclick:()=>{
      [...el.children].forEach(c=>c.classList.remove('on'));
      b.classList.add('on');cb(val);
    }},label);
    el.append(b);
  }
  return el;
}

/* ---------------- domain helpers ---------------- */
// Most recent finished session containing this exercise — powers the PREV column.
function prevSetsFor(exId){
  let best=null;
  for(const w of S.workouts){
    const en=w.exs.find(x=>x.exId===exId);
    if(en&&en.sets.length&&(!best||w.finishedAt>best.date))best={date:w.finishedAt,sets:en.sets};
  }
  return best;
}
// All-time records for an exercise (warm-ups excluded; bodyweight included
// for Bodyweight-equipment lifts, recalculated against your latest bodyweight).
function computeRecords(exId){
  const ex=S.ex.get(exId);
  let e1=null,wr=null,vr=null,found=false;
  for(const w of S.workouts){
    const en=w.exs.find(x=>x.exId===exId);
    if(!en)continue;
    let vol=0;
    for(const st of en.sets){
      if(st.t==='W')continue;
      const wt=loadOf(ex,st),r=st.r||0;
      vol+=wt*r;
      if(wt>0&&r>0){
        found=true;
        if(!wr||wt>wr.v)wr={v:wt,date:w.finishedAt};
        const e=epley(wt,r);
        if(e>0&&(!e1||e>e1.v))e1={v:e,date:w.finishedAt};
      }
    }
    if(vol>0&&(!vr||vol>vr.v))vr={v:vol,date:w.finishedAt};
  }
  return {e1rm:e1,w:wr,vol:vr,fresh:!found};
}
const setVol=st=>(st.w||0)*(st.r||0);
/* Bodyweight-equipment exercises: the typed weight is the ADDED load; all
   volume/1RM/records/radar math counts your latest logged bodyweight on top.
   Display (PREV column, set rows, history lines) stays as typed. */
let BW_CACHE=null;   // invalidated whenever body entries change
function latestBW(){
  if(BW_CACHE==null){
    const e=[...S.body].filter(b=>b.key==='Weight').sort((a,b)=>b.date-a.date)[0];
    BW_CACHE=e?e.value:(S.set.unit==='kg'?75:165);
  }
  return BW_CACHE;
}
function loadOf(ex,st){   // effective load of a set
  const w=st.w||0;
  return ex&&ex.e==='Bodyweight'?w+latestBW():w;
}
function workoutVolume(w){
  let v=0;
  for(const en of w.exs){
    const ex=S.ex.get(en.exId);
    for(const st of en.sets)if(st.t!=='W')v+=loadOf(ex,st)*(st.r||0);
  }
  return v;
}
function workoutSets(w){let n=0;for(const en of w.exs)n+=en.sets.length;return n;}
const workoutsDesc=()=>[...S.workouts].sort((a,b)=>b.finishedAt-a.finishedAt);

/* ---------------- settings ---------------- */
const saveSettings=()=>kvPut('settings',S.set);
function settingsSheet(){
  const c=h('div');
  c.append(h('span',{class:'lbl'},'Your name'),
    h('input',{class:'in',placeholder:'For greetings — leave blank to skip',value:S.set.name||'',
      oninput:e=>{S.set.name=e.target.value;saveSettings();}}));
  c.append(h('span',{class:'lbl'},'Theme'),
    seg([['dark','White on black'],['light','Black on white']],S.set.theme||'dark',v=>{
      S.set.theme=v;saveSettings();applyTheme();renderTab();
    }));
  c.append(h('span',{class:'lbl'},'Units'),
    seg(['kg','lb'],S.set.unit,v=>{S.set.unit=v;saveSettings();}));
  const numRow=(label,key,hint)=>{
    c.append(h('span',{class:'lbl'},label),
      h('input',{class:'in num',inputmode:'decimal',value:S.set[key],
        oninput:e=>{S.set[key]=numOr(e.target.value,DEF[key]);saveSettings();}}));
    if(hint)c.append(h('p',{class:'tiny dim',style:'margin:5px 2px 0'},hint));
  };
  numRow('Default rest timer (seconds)','restSec','Auto-starts after each logged set. Override per exercise from its ⋯ menu.');
  numRow('Bar weight','barWeight');
  c.append(h('span',{class:'lbl'},'Available plates (per side)'),
    h('input',{class:'in',inputmode:'decimal',value:S.set.plates.join(', '),
      oninput:e=>{
        const p=e.target.value.split(/[,\s]+/).map(Number).filter(v=>v>0).sort((a,b)=>b-a);
        if(p.length){S.set.plates=p;saveSettings();}
      }}));
  const tglRow=(label,key)=>{
    const t=h('button',{class:'tgl'+(S.set[key]?' on':''),onclick:()=>{S.set[key]=!S.set[key];t.classList.toggle('on',S.set[key]);saveSettings();}});
    c.append(h('div',{class:'lrow'},h('div',{class:'grow'},label),t));
  };
  c.append(h('span',{class:'lbl'},'Rest timer alerts'));
  tglRow('Sound','sound');
  tglRow('Vibration','vibrate');
  c.append(h('p',{class:'tiny dim',style:'margin:4px 2px 0'},'iPhone note: web apps can’t drive the vibration motor — IronLog taps the system haptic instead (iOS 18+, best-effort). Sound is the reliable alert.'));
  // notification toggle: enabling asks for permission (must be a user gesture)
  const ns=notifSupport();
  const nStatus=h('p',{class:'tiny dim',style:'margin:2px 2px 0'});
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const nUpdate=()=>{
    if(!ns.ok)nStatus.textContent=ns.why;
    else if(Notification.permission==='denied')nStatus.textContent='Blocked — allow notifications for this site in browser settings.';
    else nStatus.textContent=S.set.notify?'Notifies when rest ends while the app is hidden.':'Off — sound & vibration still work.';
    if(isIOS)nStatus.textContent+=' iPhone: needs HTTPS + Add to Home Screen (iOS 16.4+).';
  };
  const nt=h('button',{class:'tgl'+(S.set.notify&&ns.ok&&Notification.permission==='granted'?' on':''),onclick:async()=>{
    if(!ns.ok){toast(ns.why);return;}
    if(!S.set.notify){
      let perm=Notification.permission;
      if(perm==='default')perm=await Notification.requestPermission();
      if(perm!=='granted'){toast(perm==='denied'?'Blocked — allow notifications in browser settings':'Permission not granted');nUpdate();return;}
      S.set.notify=true;
    }else S.set.notify=false;
    nt.classList.toggle('on',S.set.notify);
    saveSettings();nUpdate();
  }});
  c.append(h('div',{class:'lrow'},
    h('div',{class:'grow'},'Notification'),
    h('button',{class:'btn sm inline',style:'min-height:36px;font-size:13px;flex:0 0 auto',onclick:()=>{
      if(!ns.ok){toast(ns.why);return;}
      if(Notification.permission!=='granted'){toast('Turn the toggle on first to grant permission');return;}
      notifyRestDone('Bench Press',true);
      toast('Test notification sent');
    }},'Test'),
    nt),nStatus);
  nUpdate();
  const importFile=h('input',{type:'file',accept:'.json,application/json',style:'display:none',
    onchange:e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value='';}});
  c.append(h('hr'),
    h('p',{class:'small dim',style:'margin:0 2px 10px'},
      S.workouts.length+' workouts · '+S.ex.size+' exercises · '+S.photos.length+' photos — all stored on this device. · IronLog v'+APP_VER),
    h('button',{class:'btn',onclick:exportJSON},'Export data (JSON backup)'),
    h('button',{class:'btn mt8',onclick:()=>importFile.click()},'Import data'),
    h('button',{class:'btn danger mt8',onclick:eraseAll},'Erase all data'),
    importFile);
  sheet('Settings',c);
}

/* ---------------- export / import / erase ---------------- */
const blobToDataUrl=b=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(b);});
async function buildExportData(){
  const photos=await Promise.all(S.photos.map(async p=>({id:p.id,date:p.date,dataUrl:await blobToDataUrl(p.blob)})));
  return {app:'ironlog',version:1,exportedAt:new Date().toISOString(),
    settings:S.set,exercises:[...S.ex.values()],workouts:S.workouts,
    templates:S.templates,body:S.body,photos};
}
async function exportJSON(){
  try{
    const data=await buildExportData();
    const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
    const a=h('a',{href:URL.createObjectURL(blob),download:'ironlog-backup-'+new Date().toISOString().slice(0,10)+'.json'});
    document.body.append(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),10000);
    toast('Backup exported ('+(blob.size>1048576?(blob.size/1048576).toFixed(1)+' MB':Math.round(blob.size/1024)+' KB')+')');
  }catch(err){toast('Export failed: '+err.message);}
}
async function importJSON(file){
  let data;
  try{data=JSON.parse(await file.text());}catch(e){toast('Not a valid JSON file');return;}
  if(!data||data.app!=='ironlog'||!Array.isArray(data.exercises||[])||!Array.isArray(data.workouts||[])){
    toast('Not an IronLog backup file');return;
  }
  const ok=await ask('Import backup?',
    'This replaces ALL current data with the backup from '+(data.exportedAt||'?').slice(0,10)+' ('+(data.workouts||[]).length+' workouts, '+(data.exercises||[]).length+' exercises, '+(data.photos||[]).length+' photos).','Replace everything',true);
  if(!ok)return;
  try{
    await applyImport(data);
    toast('Backup imported — '+S.workouts.length+' workouts restored');
  }catch(err){toast('Import failed: '+err.message);}
}
// separated from the confirm dialog so it is testable and reusable;
// tolerant of records written by older/newer versions (missing fields get defaults)
async function applyImport(data){
  for(const s of['exercises','workouts','templates','body','photos'])await dbClear(s);
  await kvDel('active');
  for(const e of data.exercises||[])if(e&&e.id&&e.name)await dbPut('exercises',{m:'Other',s:[],e:'Other',...e});
  for(const w of data.workouts||[])if(w&&w.id&&Array.isArray(w.exs))await dbPut('workouts',{name:'Workout',notes:'',dur:0,...w});
  for(const t of data.templates||[])if(t&&t.id&&Array.isArray(t.exs))await dbPut('templates',{name:'Template',pos:0,...t});
  for(const b of data.body||[])if(b&&b.id&&b.key&&typeof b.value==='number')await dbPut('body',b);
  for(const p of data.photos||[]){
    if(!p||!p.id||!p.dataUrl)continue;
    try{const blob=await(await fetch(p.dataUrl)).blob();await dbPut('photos',{id:p.id,date:p.date||Date.now(),blob});}catch(e){}
  }
  if(data.settings)S.set={...DEF,...data.settings};
  await saveSettings();
  await loadAll();
  S.active=null;S.prev={};S.records={};
  renderTab();
}
async function eraseAll(){
  const ok=await ask('Erase all data?','Every workout, template, measurement and photo will be permanently deleted from this device.','Erase everything',true);
  if(!ok)return;
  for(const s of['exercises','workouts','templates','body','photos','kv'])await dbClear(s);
  location.reload();
}

/* ----- workout lifecycle ----- */
const defaultName=()=>{const hh=new Date().getHours();return(hh<5?'Night':hh<11?'Morning':hh<15?'Midday':hh<18?'Afternoon':'Evening')+' Workout';};
const newWorkoutShell=name=>({id:uid(),name:name||defaultName(),notes:'',startedAt:Date.now(),exs:[]});

function guardActive(){
  if(!S.active)return Promise.resolve(true);
  return ask('Workout in progress','Starting a new one will discard your current workout.','Discard & start',true);
}
function startEmpty(){
  S.active=newWorkoutShell();S.prev={};S.records={};
  saveActive();renderLog();
}
async function startFromTemplate(t){
  if(!(await guardActive()))return;
  S.active=newWorkoutShell(t.name);S.prev={};S.records={};
  for(const te of t.exs)addExerciseToActive(te.exId,te);
  saveActive();switchTab('log');
}
async function repeatWorkout(w){
  if(!(await guardActive()))return;
  S.active=newWorkoutShell(w.name);S.prev={};S.records={};
  for(const en of w.exs){
    addExerciseToActive(en.exId);
    const added=S.active.exs[S.active.exs.length-1];
    added.sets=en.sets.map(s2=>({t:s2.t||'N',w:null,r:null,rpe:null,done:false}));
  }
  saveActive();switchTab('log');
}
// Adds an exercise entry. Rows mirror the previous session (so every row has a
// PREV reference), or the template's target set count, or 3 empty sets.
function addExerciseToActive(exId,tpl){
  if(!(exId in S.prev))S.prev[exId]=prevSetsFor(exId);
  if(!(exId in S.records))S.records[exId]=computeRecords(exId);
  const p=S.prev[exId];
  let sets;
  if(tpl&&tpl.sets)sets=Array.from({length:tpl.sets},newSet);
  else if(p)sets=p.sets.map(s2=>({t:s2.t||'N',w:null,r:null,rpe:null,done:false}));
  else sets=[newSet(),newSet(),newSet()];
  const en={exId,notes:'',sets};
  if(tpl)en.tgt={w:tpl.w!=null?tpl.w:null,r:tpl.reps!=null?tpl.reps:null,rpe:tpl.rpe!=null?tpl.rpe:null};
  S.active.exs.push(en);
  saveActive();
}

// PREV reference for a row: same-index set from the previous session of this
// exercise, falling back to the template target. This is the priority feature.
function ghost(en,j){
  const p=S.prev[en.exId];
  if(p&&p.sets[j])return{t:p.sets[j].t,w:p.sets[j].w,r:p.sets[j].r,rpe:p.sets[j].rpe,src:'prev'};
  if(en.tgt&&(en.tgt.w!=null||en.tgt.r!=null))return{t:'N',w:en.tgt.w,r:en.tgt.r,rpe:en.tgt.rpe,src:'tgt'};
  return null;
}
function prevTxt(g){
  if(!g)return '—';
  const tag=g.t&&g.t!=='N'?g.t+' ':'';
  if(g.w!=null&&g.r!=null)return tag+fmtW(g.w)+'×'+g.r;
  if(g.r!=null)return tag+g.r+' reps';
  if(g.w!=null)return tag+fmtW(g.w);
  return '—';
}
function setNumber(en,j){let n=0;for(let k=0;k<=j;k++)if(en.sets[k].t!=='W')n++;return n;}

    oninput:e=>{const v=pf(e.target.value);st.r=v==null?null:Math.round(v);saveActive();updateWoStats();}});
  const pIn=h('input',{class:'set-in num',type:'text',inputmode:'decimal',

    title:g&&g.src==='tgt'?'Template target — tap to fill':'Previous session — tap to fill',

      if(!g)return;

      if(g.r!=null){st.r=g.r;rIn.value=g.r;}

    }},prevTxt(g));

    html:'<svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg>'});
  row.append(typeBtn,prevBtn,wIn,rIn,pIn,chk);

function toggleDone(i,j,row,wIn,rIn){
  const en=S.active.exs[i],st=en.sets[j];
  if(!st.done){
    // empty fields adopt the PREV/target reference when the set is checked off
    const g=ghost(en,j);
    if(st.w==null&&g&&g.w!=null){st.w=g.w;wIn.value=fmtW(g.w);}
    if(st.r==null&&g&&g.r!=null){st.r=g.r;rIn.value=String(g.r);}

      !!st.pr||(g&&g.w!=null&&st.w!=null&&st.w>=g.w)||(st.rpe!=null&&st.rpe>=9));

    st.done=false;row.classList.remove('done');

/* ----- PR detection (live, while logging) ----- */
// milestone "club" lifts: first time the bar hits 60/80/100/120… kg
// (135/180/225… lb) on an exercise. Uses typed bar weight — plates, not BW.
function milestoneFor(w,prevBest){
  const step=S.set.unit==='kg'?20:45,start=S.set.unit==='kg'?60:135;
  if(w<start)return null;
  const m=Math.floor((w-start)/step)*step+start;   // highest milestone reached
  if(prevBest!=null&&prevBest>=m)return null;      // already a member
  return m;
}
function checkPR(exId,st,row){
  if(st.t==='W'||!st.r)return;
  const ex=S.ex.get(exId);
  const isBW=!!(ex&&ex.e==='Bodyweight');
  const rec=S.records[exId]||(S.records[exId]={e1rm:null,w:null,vol:null,fresh:true});
  const prevBestW=rec.w?rec.w.v:null;
  const w=loadOf(ex,st),e=w>0?epley(w,st.r):0;
  const msgs=[];
  if(w>0&&(!rec.w||w>rec.w.v+1e-9)){if(!rec.fresh)msgs.push('weight PR '+fmtW(w)+' '+S.set.unit+(isBW?' incl. BW':''));rec.w={v:w,date:Date.now()};}
  if(e>0&&(!rec.e1rm||e>rec.e1rm.v+1e-9)){if(!rec.fresh)msgs.push('est. 1RM PR '+fmtW(round1(e))+' '+S.set.unit);rec.e1rm={v:e,date:Date.now()};}
  if(msgs.length){
    st.pr=1;
    if(row)row.classList.add('prset');
    const emo=['🚀','🎉','🔥','💥','⚡','🏆'][Math.floor(Math.random()*6)];
    toast(emo+' '+(ex?ex.name:'')+' — '+msgs.join(', '),{pr:true,dur:4500});
    celebrate();
  }
  if(!isBW&&st.w){
    const m=milestoneFor(st.w,prevBestW);
    if(m!=null){
      st.pr=1;
      if(row)row.classList.add('prset');
      toast('💯 '+fmtW(m)+' '+S.set.unit+' CLUB — '+(ex?ex.name:'')+'!',{pr:true,dur:5500});
      celebrateBig();
    }
  }
}

function plateSheet(defW,ex){
  const res=h('div',{class:'mt12'});
  const inp=h('input',{class:'in num',inputmode:'decimal',
    value:defW?fmtW(defW):'',placeholder:'Target weight ('+S.set.unit+')',oninput:calc});
  // per-exercise starting weight: plate-loaded machines start anywhere from
  // 0 to 20+ — saved on the exercise so each machine remembers its own
  const baseIn=h('input',{class:'in num',inputmode:'decimal',
    value:fmtW(ex&&ex.baseW!=null?ex.baseW:S.set.barWeight),
    oninput:async e=>{
      const v=pf(e.target.value);
      if(ex){
        if(v==null)delete ex.baseW;else ex.baseW=v;
        await dbPut('exercises',ex);
      }
      calc();
    }});
  const baseVal=()=>{const v=pf(baseIn.value);return v==null?S.set.barWeight:v;};
  function calc(){
    const w=pf(inp.value);
    res.replaceChildren();
    if(w==null)return;
    const bar=baseVal();
    if(w<bar){res.append(h('p',{class:'small dim'},'Below bar weight ('+fmtW(bar)+' '+S.set.unit+')'));return;}
    let per=(w-bar)/2;
    const out=[];
    for(const p of[...S.set.plates].sort((a,b)=>b-a)){
      let n=0;
      while(per>=p-1e-9){per-=p;n++;}
      if(n)out.push({v:p,n});
    }
    // side-on loaded bar, competition plate colours
    const maxP=Math.max(...S.set.plates);
    const viz=h('div',{class:'plates-viz'},h('div',{class:'bar-line'}));
    for(const {v,n} of out)for(let k=0;k<n;k++){
      const hgt=Math.round(44+(v/maxP)*66);
      const wd=v>=maxP*.6?15:v>=maxP*.2?12:9;
      viz.append(h('div',{class:'pwrap'},
        h('div',{class:'plate',style:'width:'+wd+'px;height:'+hgt+'px;background:'+plateColor(v)}),
        h('div',{class:'plbl num'},fmtW(v))));
    }
    viz.append(h('div',{class:'bar-collar'}));
    res.append(viz,
      h('p',{class:'bold num',style:'font-size:17px;text-align:center;margin-top:6px'},
        out.length?'Per side:  '+out.map(o=>fmtW(o.v)+'×'+o.n).join('   '):'Empty bar'));
    if(per>0.01)res.append(h('p',{class:'small',style:'color:var(--amb);margin-top:8px;text-align:center'},fmtW(round1(per*2))+' '+S.set.unit+' can’t be made with your plates'));
  }
  sheet('Plate calculator',h('div',{},
    h('span',{class:'lbl'},'Target weight ('+S.set.unit+')'),inp,
    h('span',{class:'lbl'},'Bar / machine start weight'),baseIn,
    h('p',{class:'tiny dim',style:'margin:5px 2px 0'},
      (ex?'Saved for '+ex.name+' — use 0 for machines that start empty.':'Global bar weight — open from an exercise’s menu to save per-machine.')
      +'  Plates: '+S.set.plates.join('/')),
    res));
  calc();
}
function warmupSheet(i){
  const en=S.active.exs[i];
  const res=h('div',{class:'mt12'});
  let scheme=[];
  const guess=bestWeightGuess(en);
  const inc=S.set.unit==='kg'?2.5:5;
  const inp=h('input',{class:'in num',inputmode:'decimal',
    value:guess?fmtW(guess):'',placeholder:'Working weight ('+S.set.unit+')',oninput:calc});
  function calc(){
    const w=pf(inp.value);
    res.replaceChildren();scheme=[];
    if(!w||w<=0)return;
    const bar=S.set.barWeight;
    if(w>bar)scheme.push({w:bar,r:10,pct:'bar'});
    for(const[pct,r]of[[.4,8],[.6,5],[.8,3],[.9,1]]){
      const wt=Math.round(w*pct/inc)*inc;
      if(wt>bar&&wt<w&&!scheme.some(s2=>s2.w===wt))scheme.push({w:wt,r,pct:Math.round(pct*100)+'%'});
    }
    if(!scheme.length){res.append(h('p',{class:'small dim'},'Weight too light for a ramp.'));return;}
    res.append(...scheme.map(s2=>h('div',{class:'lrow'},
      h('div',{class:'grow bold num',style:'font-size:17px'},fmtW(s2.w)+' '+S.set.unit+'  ×  '+s2.r),
      h('div',{class:'tiny dim'},s2.pct))));
  }
  const close=sheet('Warm-up calculator',h('div',{},inp,res,
    h('button',{class:'btn primary mt12',onclick:()=>{
      if(!scheme.length)return;
      en.sets.unshift(...scheme.map(s2=>({t:'W',w:s2.w,r:s2.r,rpe:null,done:false})));
      saveActive();close();replaceCard(i);toast('Warm-up sets added');
    }},'Add as warm-up sets')));
  calc();

function substituteSheet(i){
  const en=S.active.exs[i],ex=S.ex.get(en.exId);
  if(!ex)return;
  const nm=m=>REGION[m]||m;
  const cands=[...S.ex.values()].filter(x=>x.id!==ex.id).map(x=>{
    let sc=0;
    if(x.m===ex.m)sc+=4;else if(nm(x.m)===nm(ex.m))sc+=3;
    if((ex.s||[]).some(s2=>nm(s2)===nm(x.m)))sc+=2;
    if((x.s||[]).some(s2=>nm(s2)===nm(ex.m)))sc+=2;
    sc+=(x.s||[]).filter(s2=>(ex.s||[]).map(nm).includes(nm(s2))).length*.5;
    if(x.e===ex.e)sc+=.5;
    return{x,sc};
  }).filter(o=>o.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,20);

    rows.length?rows:h('p',{class:'small dim',style:'padding:10px 2px'},'No similar exercises found.')));
}

/* ----- finish & save ----- */
async function finishWorkout(){
  const a=S.active;
  if(!a)return;
  let done=0,pending=0,vol=0,prs=0;
  for(const en of a.exs){
    const ex=S.ex.get(en.exId);
    for(const st of en.sets){
      if(st.done){done++;if(st.t!=='W')vol+=loadOf(ex,st)*(st.r||0);if(st.pr)prs++;}
      else if(st.w!=null||st.r!=null)pending++;
    }
  }
  if(!done){
    if(await ask('Nothing logged','No completed sets — discard this workout?','Discard',true)){
      S.active=null;S.prev={};S.records={};saveActive();renderLog();
    }
    return;
  }
  const dur=Math.round((Date.now()-a.startedAt)/1000);
  const nameIn=h('input',{class:'in',value:a.name});
  const noteIn=h('textarea',{class:'in',placeholder:'How did it go?'},a.notes||'');
  const close=sheet('Finish workout',h('div',{},
    h('div',{class:'statgrid'},
      h('div',{},h('div',{class:'v num'},fmtDur(dur)),h('div',{class:'k'},'Duration')),
      h('div',{},h('div',{class:'v num'},done),h('div',{class:'k'},'Sets')),
      h('div',{},h('div',{class:'v num'},fmtVol(vol)+' '+S.set.unit),h('div',{class:'k'},'Volume')),
      h('div',{},h('div',{class:'v num'},prs?'🏆 '+prs:'—'),h('div',{class:'k'},'PRs'))),
    pending?h('p',{class:'small',style:'color:var(--amb);margin:0 2px 10px'},pending+' incomplete set'+(pending>1?'s':'')+' will be discarded.'):null,
    h('span',{class:'lbl'},'Name'),nameIn,
    h('span',{class:'lbl'},'Notes'),noteIn,
    h('button',{class:'btn green mt12',onclick:save},'Save Workout')));
  async function save(){
    const exs=a.exs.map(en=>({exId:en.exId,notes:en.notes||'',
      sets:en.sets.filter(s2=>s2.done).map(s2=>{
        const o={t:s2.t,w:s2.w,r:s2.r,rpe:s2.rpe};
        if(s2.pr)o.pr=1;
        return o;
      })})).filter(en=>en.sets.length);
    const volPRs=[];
    for(const en of exs){
      const x=S.ex.get(en.exId);
      const sv=en.sets.reduce((t2,s2)=>t2+(s2.t!=='W'?loadOf(x,s2)*(s2.r||0):0),0);
      const rec=S.records[en.exId];
      if(rec&&!rec.fresh&&rec.vol&&sv>rec.vol.v&&x)volPRs.push(x.name);
    }
    const w={id:a.id,name:nameIn.value.trim()||a.name,notes:noteIn.value.trim(),
      startedAt:a.startedAt,finishedAt:Date.now(),dur,exs};
    await dbPut('workouts',w);
    S.workouts.push(w);
    S.active=null;S.prev={};S.records={};
    skipRest();clearTimeout(saveT);await kvDel('active');
    close();renderLog();
    toast('Workout saved 💪'+(volPRs.length?' · session volume PR: '+volPRs.join(', '):''),{dur:3500});
    offerTemplate(w);
  }
}

/* ==========================================================================
   REST TIMER — global; keeps counting on any tab
   ========================================================================== */
const RT={on:false,endsAt:0,total:0,int:null,label:'',alarm:null};
function startRest(sec,label){
  if(!sec||sec<=0)return;
  RT.on=true;RT.endsAt=Date.now()+sec*1000;RT.total=sec;RT.label=label||'';
  const p=$('#restpill');
  p.classList.remove('donefx');p.classList.add('show');
  if(!RT.int)RT.int=setInterval(tickRest,200);
  // one-shot alarm so completion still fires on time when a hidden tab
  // throttles the 200 ms interval
  clearTimeout(RT.alarm);
  RT.alarm=setTimeout(tickRest,sec*1000+80);
  tickRest();
}
function tickRest(){
  if(!RT.on)return;
  const rem=(RT.endsAt-Date.now())/1000;
  if(rem<=0){
    RT.on=false;
    $('#rt-fill').style.width='100%';
    restDone();
    return;
  }
  $('#rt-time').textContent=fmtClock(Math.ceil(rem));
  $('#rt-fill').style.width=Math.min(100,Math.max(0,(1-rem/RT.total)*100))+'%';
}
function restDone(){
  beep();
  notifyRestDone(RT.label);
  haptic([250,120,250]);
  const p=$('#restpill');
  p.classList.add('donefx');
  $('#rt-time').textContent='Go!';
  setTimeout(()=>{if(!RT.on)p.classList.remove('show','donefx');},2400);
}
function adjustRest(d){
  if(!RT.on)return;
  RT.endsAt=Math.max(Date.now()+500,RT.endsAt+d*1000);
  RT.total=Math.max(RT.total,(RT.endsAt-Date.now())/1000);
  clearTimeout(RT.alarm);
  RT.alarm=setTimeout(tickRest,Math.max(100,RT.endsAt-Date.now()+80));
  tickRest();
}
function skipRest(){
  RT.on=false;
  clearTimeout(RT.alarm);
  $('#restpill').classList.remove('show','donefx');
}
/* completion beep — WebAudio (context unlocked on first touch) */
let AC=null;
function audioCtx(){
  if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended')AC.resume().catch(()=>{});
  return AC;
}
document.addEventListener('pointerdown',audioCtx,{once:true,capture:true});
function beep(){
  if(!S.set.sound)return;
  const c=audioCtx();
  if(!c)return;
  const t0=c.currentTime;
  [[0,880],[.22,880],[.44,1318.5]].forEach(([d,f])=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(.0001,t0+d);
    g.gain.exponentialRampToValueAtTime(.5,t0+d+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t0+d+.18);
    o.connect(g);g.connect(c.destination);
    o.start(t0+d);o.stop(t0+d+.22);
  });
}
/* ----- rest-over notification (Notification API via service worker where
   available). Requires a secure context (HTTPS or localhost); on iPhone it
   additionally requires the app installed to the Home Screen (iOS 16.4+).
   Over plain http we say so in Settings and fall back to sound/vibration. ----- */
function notifSupport(){
  if(!('Notification' in window))return{ok:false,why:'Notifications aren’t supported in this browser.'};
  if(!window.isSecureContext)return{ok:false,why:'Needs HTTPS or localhost — not available over plain http.'};
  return{ok:true,why:''};
}
let NICON=null;
function notifIcon(){
  if(NICON)return NICON;
  try{
    const c=document.createElement('canvas');c.width=c.height=96;
    const x=c.getContext('2d');
    x.fillStyle='#4c8dff';x.beginPath();x.arc(48,48,46,0,7);x.fill();
    x.font='54px serif';x.textAlign='center';x.textBaseline='middle';x.fillText('🏋️',48,53);
    NICON=c.toDataURL();
  }catch(e){}
  return NICON;
}
async function notifyRestDone(label,force){
  if(!S.set.notify&&!force)return;
  if(!force&&document.visibilityState==='visible')return;   // pill + beep cover the foreground
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const title='Rest over — go! ⏱️';
  const body=label?'Next set: '+label:'Time for your next set.';
  try{
    let reg=null;
    if('serviceWorker' in navigator)reg=await navigator.serviceWorker.getRegistration();
    if(reg&&reg.showNotification){
      await reg.showNotification(title,{body,tag:'ironlog-rest',renotify:true,vibrate:[250,120,250],icon:notifIcon()});
    }else{
      const n=new Notification(title,{body,tag:'ironlog-rest',icon:notifIcon()});
      n.onclick=()=>{try{window.focus();n.close();}catch(e){}};
    }
  }catch(e){}
}

function setLine(st){
  const rpe=st.rpe!=null?'  @ '+st.rpe:'';

  if(st.r!=null)return st.r+' reps'+rpe;

// per-session series for one exercise: est. 1RM, top-set weight, total volume
function exSeries(exId,days){
  const cut=days?Date.now()-days*864e5:0;
  const ex=S.ex.get(exId);
  const pts=[];
  for(const w of[...S.workouts].sort((a,b)=>a.finishedAt-b.finishedAt)){
    if(w.finishedAt<cut)continue;
    const en=w.exs.find(x=>x.exId===exId);
    if(!en)continue;
    let e1=0,top=0,vol=0;
    for(const st of en.sets){
      if(st.t==='W')continue;
      const wt=loadOf(ex,st),r=st.r||0;
      vol+=wt*r;
      if(wt>top)top=wt;
      const e=epley(wt,r);
      if(e>e1)e1=e;
    }
    if(e1||top||vol)pts.push({x:w.finishedAt,e1rm:round1(e1),top,vol:Math.round(vol)});
  }
  return pts;
}
// weighted set/volume totals per muscle group (primary 1×, secondary 0.5×)
function muscleAgg(days,mode){
  const cut=Date.now()-days*864e5;
  const agg={};
  for(const w of S.workouts){
    if(w.finishedAt<cut)continue;
    for(const en of w.exs){
      const ex=S.ex.get(en.exId);
      if(!ex)continue;
      for(const st of en.sets){
        if(st.t==='W')continue;
        const v=mode==='sets'?1:loadOf(ex,st)*(st.r||0);
        agg[ex.m]=(agg[ex.m]||0)+v;
        for(const s2 of ex.s||[])agg[s2]=(agg[s2]||0)+v*.5;
      }
    }
  }
  return agg;
}

// downscale + JPEG-encode so years of photos stay small (and HEIC becomes viewable)
async function shrinkImage(file){
  try{
    const bmp=await createImageBitmap(file);
    const max=1280,sc=Math.min(1,max/Math.max(bmp.width,bmp.height));
    const cv=document.createElement('canvas');
    cv.width=Math.round(bmp.width*sc);cv.height=Math.round(bmp.height*sc);
    cv.getContext('2d').drawImage(bmp,0,0,cv.width,cv.height);
    const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',.85));
    return blob||file;
  }catch(e){return file;}
}

function applyTheme(){

  if(m)m.setAttribute('content',light?'#ECEAE3':'#0B0B0D');
  chartInit=false;   // charts re-read theme colours on next draw

// time-of-day + rotating greeting; name is optional and simply omitted
function greetLine(){
  const n=(S.set.name||'').trim();
  const hh=new Date().getHours();
  const tod=hh<5?'Still up':hh<12?'Good morning':hh<17?'Good afternoon':'Good evening';
  const opts=[[tod,'.'],['Hello','.'],['Ready to exercise','?'],['Time to move','.'],['Let’s get to work','.'],['Welcome back','.']];
  const pick=opts[Math.floor(Date.now()/864e5)%opts.length];
  return {base:pick[0],punct:pick[1],name:n};
}
/* Vibration honesty: iOS WebKit has never shipped navigator.vibrate, which is
   why the phone never buzzed. Fallback: programmatically toggling a native
   switch control fires a real system haptic on iOS 18+ — best-effort, and a
   silent no-op anywhere it isn't supported. Sound stays the reliable alert. */
let hapticEl=null;
function haptic(pattern){
  if(!S.set.vibrate)return;
  if(navigator.vibrate){try{navigator.vibrate(pattern);}catch(e){}return;}
  try{
    if(!hapticEl){
      hapticEl=document.createElement('input');
      hapticEl.type='checkbox';
      hapticEl.setAttribute('switch','');
      hapticEl.style.cssText='position:fixed;left:-99px;top:0;width:1px;height:1px;opacity:0;pointer-events:none';
      document.body.append(hapticEl);
    }
    const taps=Array.isArray(pattern)?Math.min(4,Math.ceil(pattern.length/2)):1;
    for(let i=0;i<taps;i++)setTimeout(()=>hapticEl.click(),i*120);
  }catch(e){}
}

/* ==========================================================================
   MUSCLE RECOVERY — fatigue = Σ (hard sets × RPE-intensity × time decay)
   ========================================================================== */
function muscleRecovery(){
  const now=Date.now(),res={};
  for(const m of MUSCLES)res[m]={fatigue:0,last:null};
  for(const w of S.workouts){
    const ageH=(now-w.finishedAt)/36e5;
    for(const en of w.exs){
      const ex=S.ex.get(en.exId);
      if(!ex)continue;
      if(!res[ex.m].last||w.finishedAt>res[ex.m].last)res[ex.m].last=w.finishedAt;
      for(const s2 of ex.s||[])if(!res[s2].last||w.finishedAt>res[s2].last)res[s2].last=w.finishedAt;
      if(ageH>120)continue;                     // >5 days ago: fully recovered
      let sets=0,rpeSum=0,rpeN=0;
      for(const st of en.sets){
        if(st.t==='W')continue;
        sets++;
        if(st.rpe){rpeSum+=st.rpe;rpeN++;}
      }
      const intensity=rpeN?Math.min(1,rpeSum/rpeN/10):.75;   // RPE 10 = max stress
      const add=sets*intensity*Math.exp(-ageH/40)*9;         // ~40 h decay constant
      res[ex.m].fatigue+=add;
      for(const s2 of ex.s||[])res[s2].fatigue+=add*.5;
    }
  }
  for(const m of MUSCLES)res[m].fatigue=Math.min(100,Math.round(res[m].fatigue));
  return res;
}
const fatigueColor=f=>'hsl('+Math.max(0,125-f*1.25)+' 62% '+(42-f*.06)+'%)';

  const c=f>=67?'#ef4444':f>=30?'#f59e0b':'#2fd671';
  return h('span',{class:'rec-chip',style:'color:'+c+';background:'+c+'22'},fatLabel(f));
}
function agoTxt(ts){
  const d=Math.floor((Date.now()-ts)/864e5);
  return d<=0?'today':d===1?'1d ago':d+'d ago';
}
// max-fold a set of muscle stats (used to light a drawn region from
// granular groups, e.g. delts → the shoulder shape)
function foldMax(rec,names){
  let f=0,last=null,trained=false;
  for(const n of names){
    const r=rec[n];
    if(!r||r.last==null)continue;
    trained=true;
    if(r.fatigue>f)f=r.fatigue;
    if(!last||r.last>last)last=r.last;
  }
  return trained?{fatigue:f,last}:{fatigue:0,last:null};
}

/* ==========================================================================
   STRENGTH PROFILE — radar + overall score
   Best est. 1RM per muscle ÷ (bodyweight × reference multiplier) × 100.
   100 ≈ advanced ("Pro"+). Machines/cables excluded (loads aren't comparable).
   ========================================================================== */
const STR_REF={Chest:1.25,Back:1.5,Shoulders:.85,Biceps:.6,Triceps:.9,Forearms:.7,Quads:1.8,Hamstrings:1.4,Glutes:2,Calves:1.6,Abs:.6,Traps:1.6,
  'Front Delts':.8,'Side Delts':.5,'Rear Delts':.5,'Adductors':1.2,'Abductors':1,'Lower Back':1.4,'Obliques':.6};
const STR_EQUIP=new Set(['Barbell','Dumbbell','Smith Machine','Bodyweight','Kettlebell']);
const RADAR_MUSCLES=['Chest','Back','Shoulders','Biceps','Triceps','Quads','Hamstrings','Glutes'];
function strengthProfile(){
  const bwEntry=[...S.body].filter(b=>b.key==='Weight').sort((a,b)=>b.date-a.date)[0];
  const bw=bwEntry?bwEntry.value:(S.set.unit==='kg'?75:165);
  const best={};
  for(const w of S.workouts)for(const en of w.exs){
    const ex=S.ex.get(en.exId);
    if(!ex||!STR_EQUIP.has(ex.e))continue;
    for(const st of en.sets){
      if(st.t==='W'||!st.r)continue;
      const eff=loadOf(ex,st);   // unweighted pull-ups etc. now count as BW
      if(eff<=0)continue;
      const e=epley(eff,st.r);
      if(!best[ex.m]||e>best[ex.m].v)best[ex.m]={v:e,name:ex.name};
    }
  }
  const per={};
  for(const m of MUSCLES)per[m]=best[m]&&STR_REF[m]?Math.round(best[m].v/(bw*STR_REF[m])*100):0;
  // granular groups feed their parent's radar axis (best of parent/children)
  const radar={};
  for(const m of RADAR_MUSCLES)radar[m]=per[m]||0;
  for(const[g,parent]of Object.entries(REGION))
    if(radar[parent]!=null&&(per[g]||0)>radar[parent])radar[parent]=per[g];
  const any=RADAR_MUSCLES.some(m=>radar[m]>0);
  const score=any?Math.round(RADAR_MUSCLES.reduce((t,m)=>t+Math.min(radar[m],140),0)/RADAR_MUSCLES.length):0;
  return {per,radar,score,bw,hasBw:!!bwEntry,best,any};
}

async function loadAll(){
  let exs=await allOf('exercises');
  if(!exs.length){                       // first run: seed the library
    for(const e of SEED)await dbPut('exercises',e);
    exs=SEED.slice();
  }
  S.ex=new Map(exs.map(e=>[e.id,e]));
  S.workouts=await allOf('workouts');
  S.templates=await allOf('templates');
  S.body=await allOf('body');
  S.photos=await allOf('photos');
  BW_CACHE=null;
}
async function boot(){
  await openDB();
  await loadAll();
  // v3 backfill for existing installs: add new seed exercises, apply granular
  // muscle tags to old seeds (custom exercises & imports are never touched)
  for(const e of SEED)if(!S.ex.has(e.id)){S.ex.set(e.id,e);await dbPut('exercises',e);}
  for(const[id,p]of Object.entries(SEED_PATCH)){
    const e=S.ex.get(id);
    if(e&&e.m!==p.m){e.m=p.m;e.s=p.s;await dbPut('exercises',e);}
  }
  S.set={...DEF,...((await kvGet('settings'))||{})};
  applyTheme();
  S.active=(await kvGet('active'))||null;
  if(S.active)for(const en of S.active.exs){       // restore caches for a resumed session
    S.prev[en.exId]=prevSetsFor(en.exId);
    S.records[en.exId]=computeRecords(en.exId);
  }
  $$('nav button').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  $('#gearbtn').addEventListener('click',settingsSheet);
  $('#rt-minus').addEventListener('click',()=>adjustRest(-15));
  $('#rt-plus').addEventListener('click',()=>adjustRest(15));
  $('#rt-skip').addEventListener('click',skipRest);
  setInterval(()=>{
    const el=$('#wo-dur');
    if(el&&S.active)el.textContent=fmtDur((Date.now()-S.active.startedAt)/1000);
    fixShell();   // heals a short standalone viewport within 1 s, event or not
  },1000);
  // iOS keyboard healing: the keyboard pans the page to reveal the focused
  // input and can leave it panned after dismissal (header clipped under the
  // status bar, dead space under the nav). Centre focused inputs inside the
  // internal scroller so iOS barely needs to pan, and snap the window back
  // whenever focus leaves an input.
  document.addEventListener('focusin',e=>{
    if(e.target.matches&&e.target.matches('input,textarea'))
      setTimeout(()=>{try{e.target.scrollIntoView({block:'center',behavior:'smooth'});}catch(err){}},300);
  });
  addEventListener('focusout',()=>setTimeout(()=>{
    const a=document.activeElement;
    if(!a||!(a.matches&&a.matches('input,textarea')))window.scrollTo(0,0);
  },60));
  // iOS-standalone shell healer. Field-observed bug (iPhone 17 / iOS 26 home-
  // screen app): the webview canvas is full-screen, but the layout viewport
  // AND visualViewport are both reported short by status-bar + home-indicator
  // (~93pt), leaving dead space under the tab bar. The one measurement iOS
  // can't fudge there is screen.width/height — in standalone, the app IS the
  // screen. Grow-only (keyboard only shrinks vv, so it can never squash us),
  // capped at 140px so nothing pathological can stretch the shell.
  function fixShell(){
    const standalone=navigator.standalone===true||matchMedia('(display-mode: standalone)').matches;
    let target=window.visualViewport?Math.round(visualViewport.height):0;
    if(standalone){
      const portrait=matchMedia('(orientation: portrait)').matches;
      const sh=portrait?Math.max(screen.width,screen.height):Math.min(screen.width,screen.height);
      if(sh>target)target=sh;
    }
    if(!target)return;
    const cur=Math.round(document.body.getBoundingClientRect().height);
    const grow=target-cur;
    if(grow>2&&grow<=140){
      document.documentElement.style.height=target+'px';   // html clips at ICB otherwise
      document.body.style.height=target+'px';
      // in this state iOS reports safe-area-inset-bottom as 0, so give the
      // nav its home-indicator clearance explicitly (see body.vfix CSS)
      document.body.classList.add('vfix');
    }
  }
  fixShell();
  if(window.visualViewport)visualViewport.addEventListener('resize',fixShell);
  addEventListener('pageshow',fixShell);
  addEventListener('orientationchange',()=>{
    document.documentElement.style.height='';
    document.body.style.height='';
    document.body.classList.remove('vfix');
    setTimeout(fixShell,350);
  });
  // service worker: rest-over notifications + offline cache (needs secure context)
  if('serviceWorker' in navigator&&window.isSecureContext)navigator.serviceWorker.register('sw.js').catch(()=>{});
  // returning to a throttled tab: sync the timer display immediately
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&RT.on)tickRest();});
  // debug/test handle (like window.__game in the neighbouring project)
  window.__il={S,buildExportData,applyImport,loadAll,renderTab,muscleRecovery,strengthProfile,computeRecords,notifyRestDone};
  switchTab('log');
}
boot().catch(err=>{
  console.error(err);
  document.body.insertAdjacentHTML('beforeend',
    '<div style="padding:90px 24px;text-align:center;color:#ff5c5c;font-size:15px">IronLog failed to start: '+err.message+'<br><br>IndexedDB must be available (serve over http:// or https://).</div>');
});
</script>
</body>
